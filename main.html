<h3 style="margin-top:10px">Широта</h3>
  <input id="shg"  type="number" placeholder="Градусы" class="inp">
  <input id="shm" type="number" placeholder="Минуты" class="inp">
  <input id="shs"  type="number" placeholder="Секунды" class="inp">

  <h3 style="margin-top:10px">Долгота</h3>
  <input id="dg"  type="number" placeholder="Градусы" class="inp">
  <input id="dm" type="number" placeholder="Минуты" class="inp">
  <input id="ds" type="number" placeholder="Секунды" class="inp">
<button id="clearparams" onClick="clearParams()" style="margin-top:10px">Очистить входные данные</button>
<h4 style="margin-top:10px">Погрешность</h4>
<p>Широта</p>
<input id="shpogr" type="number" value="-0.0000005">
<p>Долгота</p>
<input id="dpogr" type="number" value="-0.0000005">
<br>
<button onClick="showRes()" style="margin-top:10px">Рассчитать</button>
<div id="resultGroup" style="margin-top:30px">
<h3 style="margin-top:10px;margin-bottom:10px">Результаты</h3>
<p>Широта, долгота<input type="text" class="results" style="width:80%" readonly></p>
<button id="copyres" onClick="copyResults()">Скопировать</button>
<br>
</div>
<h4 style="margin-top:10px">Строка с координатами</h4>
<textarea id="strcoor" class="inp" style="height:80px; width:80%; max-width:80%; max-height:120px; min-width:60%; min-height:60px" maxlength="150"></textarea>
<br>
<button id="calcstrcoor" onClick="calcStrCoor()" style="margin-top:10px;margin-bottom:20px">Рассчитать</button>
<br>
<input id="resstrcoor" type="text">
<div id="contacts" style="margin-top: 30px">

  <script>
function showRes(){
let shirota=new Array();
let dolgota=new Array();

shirota.push(parseFloat(document.getElementById("shg").value));
shirota.push(parseFloat(document.getElementById("shm").value));
shirota.push(parseFloat(document.getElementById("shs").value));

dolgota.push(parseFloat(document.getElementById("dg").value));
dolgota.push(parseFloat(document.getElementById("dm").value));
dolgota.push(parseFloat(document.getElementById("ds").value));

let shpogr = parseFloat (document.getElementById("shpogr").value);
let dpogr = parseFloat(document.getElementById("dpogr").value);
var parResults = document.getElementById("resultGroup");

let sumSh = (shirota[0]+shirota[1]/60+shirota[2]/3600+shpogr).toFixed(9);
let sumD =(dolgota[0]+dolgota[1]/60+dolgota[2]/3600+dpogr).toFixed(9);

var results = parResults.querySelector(".results");
results.value=sumSh+" "+sumD;}

function copyResults(){
let parResults=document.getElementById("resultGroup");
let results=parResults.querySelector(".results");
results.select();
document.execCommand("copy");
}

function clearParams(){
const inputs = document.querySelectorAll('.inp');
inputs.forEach(input => input.value = '');
}
